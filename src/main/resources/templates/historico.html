<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pagamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container mt-4">

<a href="/" class="btn btn-outline-secondary mb-3">← Voltar</a>

<h2>📋 Histórico de Pagamentos</h2>
<h5 class="text-muted" th:text="${aluno.nome}"></h5>

<table class="table mt-4 table-hover shadow-sm bg-white rounded">
    <thead class="table-dark">
    <tr>
        <th>#</th>
        <th>Mês de Referência</th>
        <th>Data de Confirmação</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p, i : ${historico}">
        <td th:text="${i.count}"></td>
        <td th:text="${p.dataConfirmacao}"></td>
        <td th:text="${p.mesReferencia}"></td>
    </tr>
    </tbody>
</table>

<!-- Mensagem se não tiver histórico -->
<div th:if="${#lists.isEmpty(historico)}" class="alert alert-warning mt-3">
    Nenhum pagamento registrado ainda.
</div>

</body>
</html>
