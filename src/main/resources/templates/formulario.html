<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Novo Aluno</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container mt-5">

<div class="card shadow p-4 mx-auto" style="max-width: 500px;">
  <h2>📝 Cadastrar Novo Aluno</h2>

  <form th:action="@{/salvar}" th:object="${aluno}" method="POST">
    <div class="mb-3">
      <label class="form-label">Nome Completo</label>
      <input type="text" th:field="*{nome}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Plano</label>
      <select th:field="*{plano}" class="form-select">
        <option value="SIMPLES">Simples (R$ 100)</option>
        <option value="MEDIO">Médio (R$ 150)</option>
        <option value="MASTER">Master (R$ 200)</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Dia de Vencimento</label>
      <input type="number" th:field="*{diaVencimento}" class="form-control" min="1" max="31" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Data de Início</label>
      <input type="date" th:field="*{dataInicio}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success w-100">Finalizar Cadastro</button>
    <a href="/" class="btn btn-secondary w-100 mt-2">Voltar</a>
  </form>
</div>

</body>
</html>
