<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Academia - Gerenciador</title>
    <!-- Bootstrap para o celular ficar top -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container mt-4">

<h1>🎯 Gerenciador de Assinaturas</h1>

<div class="row mt-4">
    <!-- Card Vence Hoje -->
    <div class="col-md-4">
        <div class="card bg-danger text-white p-3 text-center shadow-sm">
            <h3>Vence Hoje</h3>
            <h2>0</h2>
        </div>

    <!-- Card Atrasados -->

        <div class="card bg-dark text-white p-3 text-center shadow-sm">
            <h3>Atrasados</h3>
            <h2>0</h2>
        </div>
    </div>

    <!-- Botão Novo Aluno -->
    <div class="col-md-4">
        <a href="/novo" class="btn btn-primary w-100 h-100 d-flex align-items-center justify-content-center fs-3 shadow-sm">
            + Novo Aluno
        </a>
    </div>
</div>

</body>
</html>
